{% extends 'base.html' %}
{% block content %}
<section class="newsletter bg-light" style="background: url(images/pattern-bg.png) no-repeat;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 py-5 my-5">
          <div class="subscribe-header text-center pb-3">
            <h3 class="section-title text-uppercase">Register</h3>
          </div>
          {% if form.errors %}
            <div class="alert alert-danger">
              {{ form.errors }}
            </div>
          {% endif %}
          <form method="post" id="form" class="d-flex flex-wrap gap-2">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" class="form-control form-control-lg">{{form.username.help_text}}
            <input type="password" name="password1" placeholder="Password" class="form-control form-control-lg">{{form.password1.help_text}}
            <input type="password" name="password2" placeholder="Repeat the password" class="form-control form-control-lg">{{form.password2.help_text}}
            <input type="email" name="email" placeholder="Email address" class="form-control form-control-lg">
            <input type="text" name="first_name" placeholder="First name" class="form-control form-control-lg">
            <input type="text" name="last_name" placeholder="Last name" class="form-control form-control-lg">
            <button class="btn btn-dark btn-lg text-uppercase w-100">Register</button>
          </form>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
