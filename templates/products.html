{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container">
    <div class="row">
        {% for i in cat.products.all %}
        <div class="col-4">
            <div class="product-item image-zoom-effect">
              <div class="image-holder">
                <a href="{% url 'superuser:detail' i.id %}">
                  <img src="{{i.image.url}}" alt="{{i.name}}" class="product-image img-fluid">
                </a>
              </div>

                <div class="product-content">
                  <h5 class="text-uppercase fs-5 mt-3">
                    <a href="{% url 'superuser:detail' i.id %}">{{i.name}}</a>
                  </h5>
                  <a href="{% url 'superuser:detail' i.id %}" class="text-decoration-none" data-after="View Details">
                      <span>{{i.price}}/- per day</span>
                  </a>
                </div>
              </div>
            </div>
        {% endfor %}
</div>
</div>
{% endblock %}
