{% extends 'base.html' %}
{% block content %}
{% if payment %}
<div class="container mt-5">
    <div class="card shadow p-4 text-center mx-auto" style="max-width:500px;">
        <h3 class="mb-3">Complete Your Payment</h3>
        <h4 class="mb-4">Amount: ₹{{ amount_rupees }}</h4>
        <form action="{% url 'cart:payment_success' %}" method="POST">
            {% csrf_token %}
            <script
                src="https://checkout.razorpay.com/v1/checkout.js"
                data-key="{{ RAZORPAY_KEY_ID }}"
                data-amount="{{ payment.amount }}"
                data-currency="INR"
                data-order_id="{{ payment.id }}"
                data-buttontext="Pay Now"
                data-name="Rent a Cam"
                data-description="Camera Booking Payment"
                data-theme.color="#F37254">
            </script>
            <input type="hidden" name="hidden">
        </form>
    </div>
</div>
{% else %}
<div class="container">
    <div class="card shadow text-center p-5 mt-5 mx-auto" style="max-width:500px;">
        <h3 class="text-success">Order Successfully Placed</h3>
        <p class="mt-3">Thank you for booking with us.</p>
    </div>
</div>

{% endif %}

{% endblock %}
