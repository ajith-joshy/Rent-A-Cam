{% extends 'base.html' %}
{% block content %}
<section class="newsletter bg-light" style="background: url(images/pattern-bg.png) no-repeat;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 py-5 my-5">
          <div class="subscribe-header text-center pb-3">
            <h3 class="section-title text-uppercase">Login</h3>
          </div>
          {% if messages %}
            {% for message in messages %}
              <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags }}{% endif %} alert-dismissible fade show text-center" role="alert">
                {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
          <form method="post" id="form" class="d-flex flex-wrap gap-2">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" class="form-control form-control-lg" required>
            <input type="password" name="password" placeholder="Password" class="form-control form-control-lg" required>
            <button class="btn btn-dark btn-lg text-uppercase w-100">Login</button>
            <a href="{% url 'rent:register' %}" class="item-anchor"><u>Do not have an account? Sign up</u></a>
          </form>
        </div>
      </div>
    </div>
  </section>

{% endblock %}
